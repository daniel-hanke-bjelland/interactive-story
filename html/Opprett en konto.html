<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opprett en konto</title>
    <link rel="stylesheet" href="../css/main.css">
    <script src="../js/konto.js"></script>
    <!-- <script src="../js/script.js"></script> -->
</head>
<body>

    <div class="wrapper_1_konto">

        <div class="wrapper_2_konto">
            <h1 id="tittel_konto">Normal?</h1>
            <h3 id="info_konto">Sign up</h3>
        </div>

        <div class="wrapper_3_konto">
            <div class="wrapper_4_konto">
                <label for="">name</label>
                <input type="text" id="name_sign_up" placeholder="Ola Nordman">
            </div>

            <div class="wrapper_4_konto">
                <label for="">epost</label>
                <input type="email" name="" id="epost_sign_up" placeholder="ola.nordman@epost.no">
            </div>

            <div class="wrapper_4_konto">
                <label for="">nickname</label>
                <input type="text" name="" id="nickname_sign_up" placeholder="OlaNordman09">
            </div>
                
            <div class="wrapper_4_konto">
                <label for="">password</label>
                <input type="password" name="" id="password_sign_up" placeholder="Ola1234Nordman89">
            </div>

            
            <p id="Sign_up_p" onclick= "opppretKonto()" > Sign up </p>
            <div id="wrapper_4_out"></div>
        </div>

        
    </div>

</body>
</html>
